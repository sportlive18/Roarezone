<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPORTLINK</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --surface: #0e1520;
    --card: #111927;
    --card-hover: #172035;
    --border: #1e2d45;
    --accent: #00c2ff;
    --accent2: #ff6b35;
    --accent3: #a855f7;
    --text: #e2eaf5;
    --muted: #5a7090;
    --glow: rgba(0,194,255,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,194,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,194,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 80vw;
    height: 60vh;
    background: radial-gradient(ellipse, rgba(0,194,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    background: rgba(8,12,20,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { display: flex; align-items: center; gap: 12px; }

  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), #0080bb);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(0,194,255,0.4);
    font-size: 18px;
  }

  .logo-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 1.6rem;
    letter-spacing: 2px; text-transform: uppercase;
    background: linear-gradient(135deg, #fff 40%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .logo-sub {
    font-size: 0.55rem; letter-spacing: 3px;
    color: var(--accent); text-transform: uppercase;
    display: block; margin-top: -4px;
    -webkit-text-fill-color: var(--accent);
  }

  .header-right { display: flex; align-items: center; gap: 14px; }

  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.7rem; font-weight: 600;
    letter-spacing: 2px; color: var(--accent2); text-transform: uppercase;
  }

  .live-dot {
    width: 7px; height: 7px;
    background: var(--accent2); border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  .search-wrap { position: relative; }

  .search-wrap input {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 8px 14px 8px 36px;
    border-radius: 8px; font-family: 'Exo 2', sans-serif;
    font-size: 0.85rem; width: 220px;
    transition: border-color 0.2s, box-shadow 0.2s; outline: none;
  }

  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,194,255,0.1);
  }

  .search-wrap input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 14px; pointer-events: none;
  }

  /* Refresh button */
  .refresh-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-family: 'Exo 2', sans-serif; font-size: 0.75rem;
    cursor: pointer; transition: all 0.2s; font-weight: 500;
    letter-spacing: 0.5px;
  }

  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.spinning .refresh-icon { animation: spin 0.8s linear infinite; }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .tabs-section { padding: 20px 28px 0; }

  .tabs { display: flex; gap: 6px; flex-wrap: wrap; }

  .tab {
    padding: 7px 16px; border-radius: 20px;
    font-size: 0.78rem; font-weight: 500; letter-spacing: 0.5px;
    cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    transition: all 0.2s; font-family: 'Exo 2', sans-serif;
  }

  .tab:hover { border-color: var(--accent); color: var(--accent); }

  .tab.active {
    background: var(--accent); border-color: var(--accent);
    color: #000; font-weight: 600;
    box-shadow: 0 0 14px rgba(0,194,255,0.35);
  }

  .section-header {
    display: flex; align-items: baseline; gap: 10px;
    padding: 22px 28px 14px;
  }

  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--text);
  }

  .channel-count { font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px; padding: 0 28px 40px;
  }

  .channel-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: fadeIn 0.4s ease both;
    text-decoration: none; display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .channel-card:hover {
    transform: translateY(-3px); border-color: var(--accent);
    box-shadow: 0 6px 28px rgba(0,194,255,0.18), 0 0 0 1px rgba(0,194,255,0.1);
    background: var(--card-hover);
  }

  .card-logo {
    width: 100%; height: 100%; min-height: 100px;
    background: #0a111e;
    display: flex; align-items: center; justify-content: center;
    padding: 16px; border-bottom: 1px solid var(--border);
    position: relative; overflow: hidden;
  }

  .card-logo::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(0,194,255,0.04), transparent 70%);
    opacity: 0; transition: opacity 0.3s;
  }

  .channel-card:hover .card-logo::after { opacity: 1; }

  .card-logo img {
    max-width: 80%; max-height: 68px; object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    transition: transform 0.3s;
  }

  .channel-card:hover .card-logo img { transform: scale(1.06); }

  .logo-fallback {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem; font-weight: 700; letter-spacing: 1px;
    color: var(--accent); text-align: center; line-height: 1.2;
  }

  .card-info { padding: 10px 12px 12px; }

  .card-name {
    font-size: 0.82rem; font-weight: 500; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px;
  }

  .card-group {
    font-size: 0.68rem; color: var(--muted); letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 5px;
  }

  .group-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  .play-overlay {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.68rem; color: var(--accent);
    opacity: 0; transition: opacity 0.2s; margin-top: 6px; font-weight: 500;
  }

  .channel-card:hover .play-overlay { opacity: 1; }

  /* Group dot colors */
  .g-sports      { background: #ff6b35; }
  .g-hindi       { background: #f59e0b; }
  .g-documentary { background: #3b82f6; }
  .g-inbangla    { background: #06b6d4; }
  .g-kids        { background: #ec4899; }
  .g-english     { background: #a855f7; }
  .g-music       { background: #f43f5e; }
  .g-bangla      { background: #22c55e; }
  .g-other       { background: #475569; }

  /* Loading state */
  .loading-wrap {
    grid-column: 1/-1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 70px 0; gap: 18px;
  }

  .loader {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .loading-text { font-size: 0.82rem; color: var(--muted); letter-spacing: 1px; }

  .error-wrap {
    grid-column: 1/-1;
    text-align: center; padding: 60px 0;
    color: var(--muted);
  }

  .error-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .error-text { font-size: 0.9rem; margin-bottom: 14px; }

  .retry-btn {
    padding: 8px 20px; border-radius: 8px;
    border: 1px solid var(--accent); background: transparent;
    color: var(--accent); font-family: 'Exo 2', sans-serif;
    font-size: 0.8rem; cursor: pointer; letter-spacing: 1px;
    transition: all 0.2s;
  }

  .retry-btn:hover { background: var(--accent); color: #000; }

  .empty {
    grid-column: 1/-1; text-align: center;
    padding: 60px 0; color: var(--muted);
  }

  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-text { font-size: 0.9rem; }

  .last-updated {
    font-size: 0.65rem; color: var(--muted);
    letter-spacing: 0.5px; margin-left: auto;
    padding-right: 28px; padding-top: 0;
    display: flex; align-items: center; gap: 6px;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.72rem; color: var(--muted); letter-spacing: 0.5px;
  }

  @media (max-width: 600px) {
    header { padding: 14px 16px; gap: 10px; flex-wrap: wrap; }
    .search-wrap input { width: 150px; }
    .refresh-btn span { display: none; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 0 16px 30px; }
    .tabs-section, .section-header { padding-left: 16px; padding-right: 16px; }
    .logo-text { font-size: 1.3rem; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <div class="logo-text">SPORTLINK</div>
        <span class="logo-sub">Live Television</span>
      </div>
    </div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <button class="refresh-btn" id="refreshBtn" title="Refresh channel list">
        <span class="refresh-icon">↻</span>
        <span>Refresh</span>
      </button>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search channels…">
      </div>
    </div>
  </header>

  <div class="tabs-section">
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="section-header">
    <span class="section-title" id="sectionTitle">All Channels</span>
    <span class="channel-count" id="channelCount"></span>
    <span class="last-updated" id="lastUpdated"></span>
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    <span>© 2026 SPORTLINK · Live Streaming</span>
    <span id="totalCount"></span>
  </footer>

</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const M3U_URL = 'https://raw.githubusercontent.com/abusaeeidx/BDxTV/refs/heads/main/roar-zone-playlist.m3u';

// Proxy list — tried in order until one works
const PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => url   // direct (works if same-origin or CORS enabled)
];

// Group display names + dot colors
const GROUP_META = {
  sports:      { label: 'Sports',       cls: 'g-sports' },
  hindi:       { label: 'Hindi',        cls: 'g-hindi' },
  documentary: { label: 'Documentary',  cls: 'g-documentary' },
  inbangla:    { label: 'Indian Bangla',cls: 'g-inbangla' },
  kids:        { label: 'Kids',         cls: 'g-kids' },
  english:     { label: 'English',      cls: 'g-english' },
  music:       { label: 'Music',        cls: 'g-music' },
  bangla:      { label: 'Bangla',       cls: 'g-bangla' },
};

// ── State ─────────────────────────────────────────────────────────────────────
let channels = [];
let activeGroup = 'All';
let searchQuery = '';

// ── M3U Parser ────────────────────────────────────────────────────────────────
function parseM3U(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const result = [];
  let current = null;

  for (const line of lines) {
    if (line.startsWith('#EXTINF')) {
      current = { name: '', logo: '', group: 'other', url: '' };
      // Extract name (after last comma)
      const nameMatch = line.match(/,(.+)$/);
      if (nameMatch) current.name = nameMatch[1].trim();
      // Extract logo
      const logoMatch = line.match(/tvg-logo="([^"]+)"/);
      if (logoMatch) current.logo = logoMatch[1].trim();
      // Extract group
      const groupMatch = line.match(/group-title="([^"]+)"/);
      if (groupMatch) current.group = groupMatch[1].trim().toLowerCase();
    } else if (line && !line.startsWith('#') && current) {
      current.url = line.trim();
      result.push(current);
      current = null;
    }
  }
  return result;
}

// ── Fetch with proxy fallback ─────────────────────────────────────────────────
async function fetchM3U() {
  let lastErr;
  for (const makeUrl of PROXIES) {
    try {
      const res = await fetch(makeUrl(M3U_URL), { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      if (!text.includes('#EXTM3U')) throw new Error('Invalid M3U');
      return text;
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr;
}

// ── Build tabs ────────────────────────────────────────────────────────────────
function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';

  const groupKeys = ['All', ...new Set(channels.map(c => c.group))];

  groupKeys.forEach(g => {
    const label = g === 'All' ? 'All' : (GROUP_META[g]?.label || capitalize(g));
    const btn = document.createElement('button');
    btn.className = 'tab' + (g === activeGroup ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => {
      activeGroup = g;
      tabsEl.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
    tabsEl.appendChild(btn);
  });
}

// ── Render grid ───────────────────────────────────────────────────────────────
function render() {
  const filtered = channels.filter(c => {
    const matchGroup = activeGroup === 'All' || c.group === activeGroup;
    const matchSearch = !searchQuery ||
      c.name.toLowerCase().includes(searchQuery) ||
      c.group.toLowerCase().includes(searchQuery);
    return matchGroup && matchSearch;
  });

  const grid = document.getElementById('grid');
  const title = document.getElementById('sectionTitle');
  const count = document.getElementById('channelCount');
  const total = document.getElementById('totalCount');

  const groupLabel = activeGroup === 'All' ? 'All Channels'
    : (GROUP_META[activeGroup]?.label || capitalize(activeGroup));
  title.textContent = groupLabel;
  count.textContent = `${filtered.length} channel${filtered.length !== 1 ? 's' : ''}`;
  total.textContent = `${channels.length} total channels`;

  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No channels found</div></div>';
    return;
  }

  filtered.forEach((ch, i) => {
    const meta = GROUP_META[ch.group] || { cls: 'g-other' };
    const playerUrl = `player.html?url=${encodeURIComponent(ch.url)}&name=${encodeURIComponent(ch.name)}`;

    const card = document.createElement('a');
    card.className = 'channel-card';
    card.href = playerUrl;
    card.style.animationDelay = `${Math.min(i * 0.03, 0.5)}s`;
    card.innerHTML = `
      <div class="card-logo">
        ${ch.logo
          ? `<img src="${ch.logo}" alt="${ch.name}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''}
        <div class="logo-fallback" style="display:${ch.logo ? 'none' : 'flex'}">${ch.name}</div>
      </div>
      <div class="card-info">
        <div class="card-name">${ch.name}</div>
        <div class="card-group">
          <span class="group-dot ${meta.cls}"></span>
          ${meta.label || capitalize(ch.group)}
        </div>
        <div class="play-overlay">▶ Watch Live</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── Show loading ──────────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById('grid').innerHTML = `
    <div class="loading-wrap">
      <div class="loader"></div>
      <div class="loading-text">Fetching live channel list…</div>
    </div>`;
  document.getElementById('channelCount').textContent = '';
  document.getElementById('totalCount').textContent = '';
}

// ── Show error ────────────────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('grid').innerHTML = `
    <div class="error-wrap">
      <div class="error-icon">⚠️</div>
      <div class="error-text">${msg}</div>
      <button class="retry-btn" onclick="loadChannels()">↻ Retry</button>
    </div>`;
}

// ── Main load ─────────────────────────────────────────────────────────────────
async function loadChannels() {
  showLoading();
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  btn.disabled = true;

  try {
    const text = await fetchM3U();
    channels = parseM3U(text);

    if (channels.length === 0) throw new Error('No channels parsed from playlist.');

    // Update last-fetched time
    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      `Updated ${now.toLocaleTimeString()}`;

    buildTabs();
    render();
  } catch (err) {
    showError(`Could not load playlist: ${err.message}`);
    console.error(err);
  } finally {
    btn.classList.remove('spinning');
    btn.disabled = false;
  }
}

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  render();
});

document.getElementById('refreshBtn').addEventListener('click', loadChannels);

// ── Helpers ───────────────────────────────────────────────────────────────────
function capitalize(s) {
  return s.charAt(0).toUpperCase() + s.slice(1);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadChannels();
</script>
</body>
</html>
